
syntax = "proto3";
import  "google/protobuf/empty.proto";
import "AuthenticationMessages.proto";
option csharp_namespace = "Infrastructure.gRPC.Protos";
service AuthenticationService{
	rpc Register(RegisterMessage) returns (AuthenticatedMessage);
	rpc Login(LoginMessage) returns (AuthenticatedMessage);
	rpc CreateRefreshToken(TokenMessage) returns (AuthenticatedMessage);
	rpc ForgetPassword(ForgetPasswordMessage) returns (BaseMessage);
	rpc ResetPassword(ResetPasswordMessage) returns (BaseMessage);
	rpc VerifyCode(VerifyCodeMessage) returns (BaseMessage);
}
