syntax = "proto3";

option csharp_namespace = "Team.Grpc";

service TeamGrpcService {
  rpc GetTeamById (GetTeamRequest) returns (TeamResponse);
  rpc GetTeamsByCompanyId (GetCompanyTeamsRequest) returns (TeamsListResponse);
  rpc GetTeamEmployees (GetTeamRequest) returns (EmployeesResponse);
  rpc GetTeamLeader (GetTeamRequest) returns (LeaderResponse);

  rpc GetTeamBasicInfo (GetTeamByIdRequest) returns (TeamBasicInfoResponse);
}

message GetTeamRequest {
  string teamId = 1;
  string companyId = 2;
}

message GetTeamByIdRequest {
  string teamId = 1;
}

message TeamBasicInfoResponse {
  string name = 1;
  string companyId = 2;
}

message GetCompanyTeamsRequest {
  string companyId = 1;
}

message TeamResponse {
  string id = 1;
  string name = 2;
  string companyId = 3;
  string teamLeadId = 4;
  repeated string employees = 5;
}

message TeamsListResponse {
  repeated TeamResponse teams = 1;
}

message EmployeesResponse {
  repeated string employeeIds = 1;
}

message LeaderResponse {
  string leaderId = 1;
}
