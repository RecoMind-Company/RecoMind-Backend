syntax = "proto3";
import "GrpcQuestMessages.proto";
import "google/protobuf/empty.proto";
option csharp_namespace = "GrpcClients.Quest";

service GrpcQuestsService {
	rpc AddAIGeneratedTasks(ListOfAiTasksRequest) returns (google.protobuf.Empty);
	rpc DeleteTaskByPlanId(DeleteTaskByPlanIdRequest) returns (google.protobuf.Empty);
}