syntax = "proto3";
option csharp_namespace = "WebApi.gRPC.Quest";

message AiTasks {
  repeated AiTask tasks = 1;
}

message AiTask {
  string task_id = 1;
  string title = 2;
  string description = 3;
  int32 duration_days = 4;
  string start_date = 5;
  string deadline_date = 6;
  AiSuggestedOwnersDto suggested_owner = 7;
  string status = 8;
  string priority = 9;
  string moduleId = 10;
}

message AiSuggestedOwnersDto {
  string user_id = 1;
  string job_title = 2;
}
