syntax = "proto3";
import "GrpcUserQuestsMessages.proto";
option csharp_namespace = "WebApi.gRPC.UserQuests";

service GrpcUserQuestsService {
	rpc IsUserInAnyQuestWithinPlan(IsUserInPlanRequest) returns (IsUserInPlanResponse);
	rpc IsUserAssignedToTask(IsUserAssignedToTaskRequest) returns (IsUserAssignedToTaskResponse);
}

