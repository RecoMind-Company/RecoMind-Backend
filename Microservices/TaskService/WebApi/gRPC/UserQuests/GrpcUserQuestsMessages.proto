syntax = "proto3";
option csharp_namespace = "WebApi.gRPC.UserQuests";

message IsUserInPlanRequest {
	string userId = 1;
	string planId = 2;
}
message IsUserInPlanResponse {
	bool isInPlan = 1;
}

message IsUserAssignedToTaskRequest {
	string userId = 1;
	string taskId = 2;
}
message IsUserAssignedToTaskResponse {
	bool isAssigned = 1;
}