syntax = "proto3";
import "google/protobuf/timestamp.proto";
option csharp_namespace = "RecoMindAuthenticationAPI.Grpc.Authentication";
message RegisterMessage{
	string fullName = 1;
	string email = 2;
	string password = 3;
	string role = 4;
}

message AuthenticatedMessage{
	string name = 1;
	string email = 2;
	google.protobuf.Timestamp ExperiesOn = 3;
	string token = 4;
	bool isAuthenticated = 5;
	repeated string roles = 6;
	string photoUrl = 7;
	string message = 8;
	string Id = 9;
}

message LoginMessage{
	string email = 1;
	string password = 2;
}

message ForgetPasswordMessage{
	string email = 1;
}

message NewPassword{
	string newPassword = 1;
	string confirmNewPassword = 2;
}

message ResetPasswordMessage{
	string oldPassword = 1;
	NewPassword newPassword = 2;
}

message VerifyCodeMessage{
	string email = 1;
	string code = 2;
	NewPassword newPassword = 3;
}

message BaseMessage{
	bool success = 1;
	string message = 2;
}

message TokenMessage{
	string refreshToken = 1;
}
message GetUserByIdMessage{
	string userId = 1;
}
message UserToReturnMessage{
	string Id = 1;
	string name = 2;
	string email = 3;
	string jobTitle = 4;
}
message GetUsersMessage{
	repeated string Ids = 1;
}
message UsersToReturnMessage{
	repeated UserToReturnMessage users = 1;
}