syntax = "proto3";
import "teamMessages.proto";
option csharp_namespace = "Authentication.Infrastructure.gRPC.TeamGrpc";

service TeamGrpcService {
  rpc GetTeamByEmployee (GetUserTeamInfoRequest) returns (UserTeamInfoResponse);

  rpc UserExist(UserExistRequest) returns (UserExistResponse);

  rpc GetTeamEmployees (TeamEmployeesRequest) returns (TeamEmployeesResponse);
}