syntax = "proto3";

package company.service;

option csharp_namespace = "Authentication.Infrastructure.gRPC.CompanyGrpc";

import "google/protobuf/timestamp.proto";


message GitByIdRequest {
    string id = 1;
}

message GitByAdminIdRequest {
    string adminId = 1;
}

message CreateCompanyRequest {
    string name = 1;
    string industry = 2;
    string country = 3;
    string size = 4;
    string code = 5;
    string discription = 7;
    string adminId = 8;
    string subscriptionId = 9;
}

// UPDATE
message UpdateCompanyRequest {
    string id = 1;
    string name = 2;
    string industry = 3;
    string country = 4;
    string size = 5;
    string code = 6;    
    string discription = 7;
    string adminId = 8;
    string subscriptionId = 9;
}

// DELETE
message DeleteCompanyRequest {
    string id = 1;
}

message DeleteCompanyResponse {
    string id = 1;
    string Description = 2;
}

// RESPONSE FOR ALL OPERATIONS
message CompanyResponse {
    string id = 1;
    string name = 2;
    string industry = 3;
    optional string country = 4 ;
    google.protobuf.Timestamp createdAt = 5;
    string adminId = 6;
    optional string SubscriptionId = 7;
    optional string Description = 8;
}

message GetAllCompaniesResponse {
    repeated CompanyResponse items = 1;
}

message AssignSubscriptionRequest {
    string companyId = 1;
    string subscriptionId = 2;
}

// EMPTY
message Empty {}
