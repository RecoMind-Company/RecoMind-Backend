syntax = "proto3";

option csharp_namespace = "Team.WebApi.Protos";

message GetTeamByIdRequest {
  string teamId = 1;
}

message GetCompanyTeamsRequest {
  string companyId = 1;
}

message TeamResponse {
  string id = 1;
  string name = 2;
  string teamLeadId = 3;
  repeated string employees = 4;
  string companyId = 5;
}

message TeamsListResponse {
  repeated TeamResponse teams = 1;
}

message GetUserTeamInfoRequest {
  string userId = 1;
}

message UserTeamInfoResponse {
  string companyId = 1;
  string teamId = 2;
  string teamName = 3;
}
