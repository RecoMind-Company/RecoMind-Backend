syntax = "proto3";

option csharp_namespace = "DbSetting.Grpc";

service DbSettingGrpcService {
    rpc GetById (GetByIdRequest) returns (DbSettingResponse);
    rpc GetByCompanyId (GetByCompanyIdRequest) returns (DbSettingResponse);
}

message GetByIdRequest {
    string id = 1;
    string companyId = 2;
}

message GetByCompanyIdRequest {
    string companyId = 1;
}

message DbSettingResponse {
    string id = 1;
    string companyId = 2;
    string name = 3;
    string dbType = 4;
    string createdAt = 5;
}